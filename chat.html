<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Lunex</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b141a" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lunex" />
  <link rel="icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="chat-body">

  <div id="chat-app" class="chat-app" hidden>

    <!-- ===================== HEADER ===================== -->
    <header class="chat-header">
      <div class="chat-header-peer">
        <div class="avatar" id="peer-avatar" aria-hidden="true">V</div>
        <div class="chat-header-info">
          <p class="chat-header-name" id="peer-name">Vaishnavi</p>
          <p class="chat-header-status" id="peer-status">
            <span class="status-dot status-dot--offline" id="status-dot"></span>
            <span id="status-text">Offline</span>
          </p>
        </div>
      </div>

      <div class="chat-header-actions">
        <button id="logout-button" class="icon-button" title="Log out" aria-label="Log out">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M16 17l5-5-5-5M21 12H9M13 4H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h6"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ===================== MESSAGE LIST ===================== -->
    <main id="message-list" class="message-list" aria-live="polite">
      <div id="messages-loading" class="messages-loading">Loading messages…</div>
      <div id="messages-end-anchor"></div>
    </main>

    <!-- Typing indicator strip, shown above the input bar -->
    <div id="typing-indicator" class="typing-indicator" hidden>
      <span id="typing-text">Vaishnavi is typing…</span>
    </div>

    <!-- ===================== INPUT BAR ===================== -->
    <footer class="composer">
      <button id="emoji-button" class="icon-button composer-icon" title="Emoji" aria-label="Open emoji picker">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
          <path d="M8.5 14.5s1.2 2 3.5 2 3.5-2 3.5-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="9" cy="9.5" r="1" fill="currentColor"/>
          <circle cx="15" cy="9.5" r="1" fill="currentColor"/>
        </svg>
      </button>

      <button id="attach-button" class="icon-button composer-icon" title="Send image" aria-label="Attach image">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M21 12.5V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="8" cy="9" r="1.6" stroke="currentColor" stroke-width="1.6"/>
          <path d="M3 16l4.5-4.5a2 2 0 0 1 2.8 0L15 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17 15v6m3-3h-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <input id="image-input" type="file" accept="image/*" capture="environment" hidden />

      <div class="composer-field-wrap">
        <textarea
          id="message-input"
          class="composer-field"
          placeholder="Message"
          rows="1"
          maxlength="4000"
        ></textarea>
      </div>

      <button id="send-button" class="send-button" title="Send" aria-label="Send message" disabled>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M3 11.5l17.5-8-7 17.5-3-7.5-7.5-2Z" fill="currentColor"/>
        </svg>
      </button>
    </footer>

    <!-- ===================== EMOJI PICKER ===================== -->
    <div id="emoji-picker" class="emoji-picker" hidden></div>
  </div>

  <!-- ===================== FULLSCREEN IMAGE VIEWER ===================== -->
  <div id="image-viewer" class="image-viewer" hidden>
    <button id="image-viewer-close" class="image-viewer-close" aria-label="Close image">✕</button>
    <a id="image-viewer-download" class="image-viewer-download" download title="Download image" aria-label="Download image">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <img id="image-viewer-img" src="" alt="Full screen image" />
  </div>

  <!-- Loading splash while auth/session checks resolve -->
  <div id="boot-splash" class="boot-splash">
    <div class="boot-logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
        <path d="M12 2a9 9 0 1 0 9.8 9.95A7.2 7.2 0 0 1 12 2Z" fill="#25d366"/>
      </svg>
    </div>
  </div>

  <!-- Firebase compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-messaging-compat.js"></script>

  <script src="firebase.js"></script>
  <script src="chat.js"></script>
</body>
</html>
